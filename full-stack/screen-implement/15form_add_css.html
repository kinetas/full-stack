<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        input {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            /* border-radius: 5px; */
            border:1px solid gray;
            outline:none;
            padding-left:10px;
        }
        /* INPUT TYPE FILE BUTTON */
        input[type="file"]::file-selector-button{
            background-color: gray;
            height:40px;
            color : white;
            outline : none;
            border : 0;
            width : 100px;
            padding-left : 0;
            margin-left : 0;
            cursor : pointer;
        }
        select {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            /* border-radius: 5px; */
            border : 1px solid;
            outline:none;
        }

        .btn{
            color:white;
            border:0;
            min-height:40px;
            cursor:pointer;
        }
        .btn-submit{
            width:100%;
            height:45px;
            font-size : 1.1rem;
            background-color: royalblue;
        }

        .wrapper {
            max-width: 380px;
            width: 100%;
            height : 700px;
            position:absolute;
            left:0;right:0;top:0;bottom:0;
            margin : auto;
           
            padding : 20px;

            border : 1px solid gray;

            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items:center;
            gap : 50px;

        }

        .wrapper>h2 {
            margin :0;
            font-size :2rem;
            /* border : 1px solid; */
            width : 100%;
            text-align:center;
        }

        .wrapper>form {
            width: 100%;
            /* border: 1px solid; */
   
        }

        .wrapper>form>.items {
            width: 100%;
            /* border: 1px solid; */
            margin-bottom: 10px;
        }

        .wrapper>form>.items:nth-child(2) input[type="file"]{
            padding-left : 0;
        }
        .wrapper>form>.items>.item {}

        .wrapper>form>.items>.item.label {
            display: flex;
            justify-content: space-between;
            margin-bottom : 5px;
        }
        .wrapper>form>.items>.item.label>span{
            font-size : .75rem;
            color : gray;
        }
        

        .wrapper>form>.items>.item.phone {
            display: flex;
            justify-content: space-between;
            gap:5px;
        }
        .wrapper>form>.items>.item.phone>select{
            width:166px;
        }

        .wrapper>form>.items>.item.birth {
            display: flex;
            justify-content: space-between;
            gap:5px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <h2>회원가입</h2>
        <form action="">
            <div class="items">
                <div class="item label">
                    <label>기본정보</label>
                    <span>필수 사항</span>
                </div>
                <div class="item">
                    <input type="email" placeholder="이메일" />
                </div>
                <div class="item">
                    <input type="password" placeholder="비밀번호" />
                </div>
                <div class="item">
                    <input type="password" placeholder="비밀번호 확인" />
                </div>
            </div>
            <div class="items">
                <div class="item label">
                    <label>닉네임</label>
                    <span>선택 사항</span>


                </div>
                <div class="item">
                    <input type="text" placeholder="닉네임" />
                </div>
                <div class="item">
                    <input type="file" placeholder="파일을 선택해주세요." />
                </div>
            </div>
            <div class="Items">

                    <label>전화번호</label>
                    <span>선택 사항</span>
                </div>

                        <option value="">010</option>

                    <input placeholder="휴대폰 번호를 입력해주세요." />
                </div>

            </div>
            <div class="Items">
                <div class="item label">
                    <label>생일</label>
                    <span>선택 사항</span>
                </div>
                <div class="item">
                    <select>
                        <option value="">1998년</option>

                        <option value="">2001년</option>

                    </select>
                    <select>

                        <option value="">5월</option>

                        <option value="">7월</option>
                        <option value="">8월</option>
                        <option value="">9월</option>
                        <option value="">10월</option>
                        <option value="">11월</option>
                        <option value="">12월</option>

                    </select>
                    <select>
                        <option value="">1일</option>
                        <option value="">2일</option>
                        <option value="">3일</option>
                        <option value="">4일</option>
                        <option value="">5일</option>
                        <option value="">6일</option>
                        <option value="">7일</option>
                        <option value="">8일</option>
                        <option value="">9일</option>
                        <option value="">10일</option>
                        <option value="">11일</option>
                        <option value="">12일</option>
                        <option value="">13일</option>
                        <option value="">14일</option>

                        <option value="">16일</option>
                        <option value="">17일</option>
                        <option value="">18일</option>
                        <option value="">19일</option>
                        <option value="">20일</option>
                        <option value="">21일</option>
                        <option value="">22일</option>
                        <option value="">23일</option>
                        <option value="">24일</option>
                        <option value="">25일</option>

                        <option value="">28일</option>
                        <option value="">29일</option>
                        <option value="">30일</option>
                        <option value="">31일</option>
                    </select>
                </div>
            </div>
            <div class="Items">
                <button>회원가입</button>
            </div>



        </form>

    </div>
</body>

</html>
