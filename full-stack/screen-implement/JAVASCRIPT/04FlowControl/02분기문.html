<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        input {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            /* border-radius: 5px; */
            border:1px solid gray;
            outline:none;
            padding-left:10px;
        }
        /* INPUT TYPE FILE BUTTON */
        input[type="file"]::file-selector-button{
            background-color: gray;
            height:40px;
            color : white;
            outline : none;
            border : 0;
            width : 100px;
            padding-left : 0;
            margin-left : 0;
            cursor : pointer;
        }
        select {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            /* border-radius: 5px; */
            border : 1px solid;
            outline:none;
        }

        .btn{
            color:white;
            border:0;
            min-height:40px;
            cursor:pointer;
        }
        .btn-submit{
            width:100%;
            height:45px;
            font-size : 1.1rem;
            background-color: royalblue;
        }

        .wrapper {
            max-width: 380px;
            width: 100%;
            height : 700px;
            position:absolute;
            left:0;right:0;top:0;bottom:0;
            margin : auto;
           
            padding : 20px;

            border : 1px solid gray;

            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items:center;
            gap : 50px;

        }

        .wrapper>h2 {
            margin :0;
            font-size :2rem;
            /* border : 1px solid; */
            width : 100%;
            text-align:center;
        }

        .wrapper>form {
            width: 100%;
            /* border: 1px solid; */
   
        }

        .wrapper>form>.items {
            width: 100%;
            /* border: 1px solid; */
            margin-bottom: 10px;
        }

        .wrapper>form>.items:nth-child(2) input[type="file"]{
            padding-left : 0;
        }
        .wrapper>form>.items>.item {}

        .wrapper>form>.items>.item.label {
            display: flex;
            justify-content: space-between;
            margin-bottom : 5px;
        }
        .wrapper>form>.items>.item.label>span{
            font-size : .75rem;
            color : gray;
        }
        

        .wrapper>form>.items>.item.phone {
            display: flex;
            justify-content: space-between;
            gap:5px;
        }
        .wrapper>form>.items>.item.phone>select{
            width:166px;
        }

        .wrapper>form>.items>.item.birth {
            display: flex;
            justify-content: space-between;
            gap:5px;
        }
    </style>

</head>

<body>

    <div class="wrapper">

        <h2>회원가입</h2>
        <form action="/api/join" method="get" onsubmit="submitForm(event)">
            <div class="items">
                <div class="item label">
                    <label>기본정보</label>
                    <span>필수 사항</span>
                </div>
                <div class="item">
                    <span style="font-size: 0.7rem;" class="message email"></span>
                    <input type="text" name="email" placeholder="이메일" />
                </div>
                <div class="item">
                    <span style="font-size: 0.7rem;" class="message pass"></span>
                    <input type="password" name="password" placeholder="비밀번호" />
                </div>
                <div class="item">
                    <span style="font-size: 0.7rem;" class="message rePass"></span>
                    <input type="password" name="rePassword" placeholder="비밀번호 확인" />
                </div>
            </div>
            <div class="items">
                <div class="item label">
                    <label>닉네임</label>
                    <span>선택 사항</span>
                </div>
                <div class="item">
                    <input type="text" placeholder="닉네임" />
                </div>
                <div class="item">
                    <input type="file" />
                </div>
            </div>
            <div class="items">
                <div class="item label">
                    <label>전화번호</label>
                    <span>선택 사항</span>
                </div>
                <div class="item phone">
                    <select>
                        <option value="">010</option>
                        <option value="">011</option>
                    </select>
                    <input placeholder="휴대폰 번호를 입력해주세요." />
                </div>
            </div>
            <div class="items">
                <div class="item label">
                    <label>생일</label>
                    <span>선택 사항</span>
                </div>
                <div class="item birth">
                    <select>
                        <option value="">1998년</option>
                        <option value="">1999년</option>
                    </select>
                    <select>
                        <option value="">1월</option>
                        <option value="">2월</option>
                    </select>
                    <select>
                        <option value="">1일</option>
                        <option value="">2일</option>
                    </select>
                </div>
            </div>
            <div class="items">
                <button class="btn btn-submit">회원가입</button>
            </div>
        </form>

    </div>

    <script>
        const submitForm = (e)=>{
            e.preventDefault(); //기본기능제거
            // console.log('call...',e);
            const form = e.target;

            // const regex = new RegExp("^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#.~_-])[A-Za-z\d@$!%*?&#.~_-]{8,20}$");
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#.~_-])[A-Za-z\d@$!%*?&#.~_-]{8,20}$/;
            
            const messageEls = form.querySelectorAll(".massage");
            messageEls.forEach((message)=>{message.innerHTML=""})
            // 유효성 검증
            if(form.email.value==""){
                // console.log("email value undefined");
                const messageEl = form.querySelector('.message.email');
                messageEl.innerHTML="※이메일 입력은 필수사항입니다."
                // console.log('messageEl', messageEl);
                return false;
                
            }
            else if(form.password.value==""){
                // console.log("password value undefined");
                const messageEl = form.querySelector('.message.pass');
                messageEl.innerHTML="※패스워드 입력은 필수사항입니다."
                // console.log('messageEl', messageEl);
                return false;
            }
            else if(!regex.test(form.password.value)){
                //대소문자, 영문자, 숫자, 특수문자 3개이상 포함 + 8자이상
                const messageEl = form.querySelector('.message.pass');
                messageEl.innerHTML="※최소 8 자 및 최대 20 자, 하나 이상의 대문자 + 하나의 소문자 + 하나의 숫자 + 하나의 특수 문자를 입력하세요."
                
                return false;
            }
            else if(form.rePassword.value==""){
                // console.log("email value undefined");
                const messageEl = form.querySelector('.message.rePass');
                messageEl.innerHTML="※패스워드를 한번 더 입력해 주세요"
                // console.log('messageEl', messageEl);
                return false;
            }
            else if(form.password.value!=form.rePassword.value){
                //패스워드 일치여부
                const messageEl = form.querySelector('.message.rePass');
                messageEl.innerHTML="※패스워드가 일치하지 않습니다."
                form.rePassword.value="";
                
                return false;
            }
            else{
                console.log("transport");
            }
            // 전송
        }
    </script>

</body>

</html>
