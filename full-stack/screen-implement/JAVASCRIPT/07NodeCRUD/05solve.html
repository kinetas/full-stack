<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- GOOGLE ICON -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * {
            font-size: 1rem;
        }

        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 300,
                'GRAD' 0,
                'opsz' 24;
            font-size: 1.5rem;
        }

        input {
            height: 35px;
        }

        .btn {
            width: 75px;
            height: 35px;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
        }

        th,
        td {
            width: 50px;
            height: 35px;
            border: 1px solid;
            margin: 2px;
        }

        th:nth-child(1),
        td:nth-child(1) {
            width: 150px;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 700px;
        }
    </style>

</head>

<body>
    <form action="" name="joinForm" onsubmit="return false">
        <input name="username" placeholder="이름을 입력하세요">
        <input name="age" placeholder="나이를 입력하세요">
        <input name="address" placeholder="주소를 입력하세요">
        <button class="btn">입력</button>
    </form>
    <hr>
    <table>
        <thead>
            <tr>
                <th class="chk">이름</th>
                <th>나이</th>
                <th>주소</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody>

        </tbody>

    </table>

    </div>
    <script>
        // form의 기본기능은 비활성화합니다
        //입력버튼을 눌렀을때 table의 tbody에 입력된 (이름/나이/주소/삭제버튼)이 생성될수 있도록합니다
        //입력된 노드의 이름/나이/주소를 수정할수 있도록합니다.
        //특정행의 삭제버튼을 클릭했을때 해당 행이 삭제 될수 있도록 합니다.

        //특정행의 위치를 위로이동/아래로 이동이 가능하도록 합니다(나중에)

        const btnEl = document.querySelector('.btn');
        const formEl = document.joinForm;
        const usernameEl = formEl.username;
        const ageEl = formEl.age;
        const addressEl = formEl.address;
        const tableBodyEl = document.querySelector('table tbody');
        let edited = false;
        let selectedNode = null;
        let dragedEl = null;

        // console.log(document.querySelector('.chk'));

        // formEl = (e) => {
        //     e.preventDefault();
        // }

        btnEl.addEventListener('click', () => {
            const name = usernameEl.value;
            const age = ageEl.value;
            const addr = addressEl.value;
            if (!isValid(name, age, addr)) {
                return;
            }

            if (edited == false) {

                insertData(name, age, addr);

                usernameEl.value = "";
                ageEl.value = "";
                addressEl.value = "";
            }
            else {
                // console.log(selectedNode.childNodes);

                updateData(selectedNode, name, age, addr);
                edited = false;
                selectedNode = null;
                usernameEl.value = "";
                ageEl.value = "";
                addressEl.value = "";
            }

        });
        function isValid(name, age, addr) {
            if (name.trim() === "") {
                alert("이름이 공백입니다.");
                return false;
            }
            if (age.trim() === "") {
                alert("나이가 공백입니다.");
                return false;
            }
            if (addr.trim() === "") {
                alert("주소가 공백입니다.");
                return false;
            }
            return true;
        }



        function insertData(name, age, addr) {
            const trEl = document.createElement('tr');
            const thNameEl = document.createElement('th');
            const thAgeEl = document.createElement('th');
            const thAddrEl = document.createElement('th');
            const deleteEl = document.createElement('th');

            trEl.setAttribute("draggable", true);
            trEl.className = 'item';
            trEl.style.userSelect = "none";

            thNameEl.innerHTML = name;
            thAgeEl.innerHTML = age;
            thAddrEl.innerHTML = addr;
            deleteEl.innerHTML = "삭제";

            trEl.addEventListener('dblclick', (e) => {
                // console.log(thNameEl.textContent);
                if (e.target.textContent == "삭제") {
                    return;
                }
                usernameEl.value = thNameEl.textContent;
                ageEl.value = thAgeEl.textContent;
                addressEl.value = thAddrEl.textContent;
                edited = true;
                selectedNode = trEl;
                selectedNode.style.backgroundColor = "lightgray";
            });
            deleteEl.style.cursor = "pointer";
            deleteEl.addEventListener('click', (e) => {
                // console.log(e.target.parentNode);
                // console.log(e.target);
                const trEl = e.target.parentNode;
                trEl.remove();
            });
            trEl.addEventListener('dragstart', (e) => {
                dragedEl = { "node": e.target.closest('.item'), "pageY": e.pageY }
                console.log("dragedEl", dragedEl);

            })
            trEl.addEventListener('dragover', (e) => {
                e.preventDefault();
            })
            trEl.addEventListener('drop', (e) => {
                e.preventDefault()
                const curEl = e.target.closest('.item');
                const curPageY = e.pageY;
                if(curPageY>dragedEl.pageY){
                    curEl.after(dragedEl.node);
                }else{
                    curEl.before(dragedEl.node);
                }
            })

            trEl.appendChild(thNameEl);
            trEl.appendChild(thAgeEl);
            trEl.appendChild(thAddrEl);
            trEl.appendChild(deleteEl);
            tableBodyEl.appendChild(trEl);
            // console.log(trEl.childNodes);

        }
        function updateData(node, name, age, addr) {
            selectedNode.childNodes[0].innerHTML = name;
            selectedNode.childNodes[1].innerHTML = age;
            selectedNode.childNodes[2].innerHTML = addr;
            selectedNode.style.backgroundColor = "white";
        }

    </script>
</body>

</html>
