<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td {
            width: 50px;
            height: 50px;
            border: 1px solid gray;
            text-align: center;
            cursor: pointer;
        }

        input {
            width: 90%;
            height: 100%;
            outline: none;
            border: 0px;
        }
    </style>

</head>

<body>

    <input id="rownum" placeholder="н–үмқҳк°ңмҲҳмһ…л Ҙ" style="width:200px;">
    <input id="colnum" placeholder="м—ҙмқҳк°ңмҲҳмһ…л Ҙ" style="width:200px;">
    <button onclick="makemap()">мғқм„ұ</button>
    <hr>
    <table id="tbl">
        <tbody>

        </tbody>
    </table>
    <script>

        //State 
        let curRow = 0;
        let curCol = 0;
        let maxRow = 0;
        let maxCol = 0;
        let selectedNode = null;

        const selectedStyle = (curRow, curCol) => {
            //
            const SelectedNode = document.querySelector(`[data-row='${curRow}'][data-col='${curCol}']`);
            SelectedNode.style.color = "white";
            SelectedNode.style.backgroundColor = "gray";
            
        }
        const deSelectedStyle = (node) => {
            //
            node.style.color = "black";
            node.style.backgroundColor = "white";
        }
        
        const makemap = () => {
            const tableEl = document.querySelector("#tbl tbody");
            const rownumEl = document.querySelector("#rownum");
            const colnumEl = document.querySelector("#colnum");
            // мҙҲкё°нҷ”
            while (tableEl.firstChild) {
                tableEl.removeChild(tableEl.firstChild);
            }
            maxRow = 0;
            maxCol = 0;
            //
            for (i = 0; i < rownumEl.value; i++) {
                const talbeR = document.createElement("tr");
                maxCol=0;
                for (j = 0; j < colnumEl.value; j++) {
                    const tdEl = document.createElement("td");
                    tdEl.addEventListener('click', (e) => {
                        // console.log("clicked..",e);
                        const dataSet = tdEl.dataset;
                        // console.log(dataSet);
                        const clickedRow = dataSet.row;
                        const clickedCol = dataSet.col;
                        // console.log(clickedRow, clickedCol);
                        if (selectedNode == null) {
                            
                        }
                        else {
                            // кё°мЎҙ м„ нғқлҗң л…ёл“ңмқҳ мҠӨнғҖмқј мӣҗлһҳлҢҖлЎң
                            deSelectedStyle(selectedNode);
                            
                        }
                        // нҒҙлҰӯн•ң мң„м№ҳ(row,col)мқҳ мҠӨнғҖмқјмқ„ м§Җм •
                        selectedStyle(clickedRow, clickedCol);
                        selectedNode = tdEl;
                        
                    });
                    tdEl.innerHTML = `[${i}, ${j}]`;
                    tdEl.setAttribute('data-row', i);
                    tdEl.setAttribute('data-col', j);
                    talbeR.appendChild(tdEl);
                    maxCol++;
                    
                }
                tableEl.appendChild(talbeR);
                maxRow++;
                console.log(maxRow,maxCol);
            }
            
        }
        
        document.addEventListener("keydown", (e) => {
            // console.log("e",e.keyCode);
            console.log("selectedNode",selectedNode.dataset);
            let row = selectedNode.dataset.row;
            let col = selectedNode.dataset.col;
            console.log(row,col);
            if (e.keyCode == 37) { //LEFT
                // мҙҲкё°нҷ”
                deSelectedStyle(selectedNode);
                //colмқ„ 1к°җмҶҢ
                (Number(col)-1)<0?0:col--;
                selectedStyle(row,col);
                console.log("LEFT");
                
                // л°”лҖҗ мң„м№ҳлЎң selectedNodeлЎң ліҖкІҪ
                selectedNode = document.querySelector(`[data-row='${row}'][data-col='${col}']`);

            } else if (e.keyCode == 39) {//RIGHT
                // мҙҲкё°нҷ”
                deSelectedStyle(selectedNode);
                //colмқ„ 1мҰқк°Җ
                (Number(col)+1>Number(maxCol)-1)?Number(maxCol)-1:col++;
                selectedStyle(row,col);
                console.log("RIGHT");
                // л°”лҖҗ мң„м№ҳлЎң selectedNodeлЎң ліҖкІҪ
                selectedNode = document.querySelector(`[data-row='${row}'][data-col='${col}']`);
                
            } else if (e.keyCode == 38) {//UP
                // мҙҲкё°нҷ”
                deSelectedStyle(selectedNode);
                //rowмқ„ 1к°җмҶҢ
                (Number(row)-1)<0?0:row--;
                selectedStyle(row,col);
                console.log("UP");
                // л°”лҖҗ мң„м№ҳлЎң selectedNodeлЎң ліҖкІҪ
                selectedNode = document.querySelector(`[data-row='${row}'][data-col='${col}']`);
                
            } else if (e.keyCode == 40) {//DOWN
                // мҙҲкё°нҷ”
                deSelectedStyle(selectedNode);
                //rowмқ„ 1мҰқк°Җ
                (Number(row)+1>Number(maxRow)-1)?Number(maxRow)-1:row++;
                selectedStyle(row,col);
                console.log("DOWN");
                // л°”лҖҗ мң„м№ҳлЎң selectedNodeлЎң ліҖкІҪ
                selectedNode = document.querySelector(`[data-row='${row}'][data-col='${col}']`);

            }
        });
    </script>
</body>

</html>
