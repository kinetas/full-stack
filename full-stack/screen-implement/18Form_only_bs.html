<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
            color: black;
        }

        body {
            margin: 0;
            padding: 0;
        }

        form {
            /* width: 380px; */
            border: 1px solid lightgray;
            margin: 50px auto;
        }
    </style>
</head>

<body>
    <!-- 
        form : 사용자로부터 특정정보를 받아 서버로 전달하는데 사용되는 태그
        action Attribute : 전달받는 서버 URI
        method Attribute : 서버로 요청하는 방식
            - GET        : 사용자 요청 정보를 Query String으로 전달(Default)
            - POST       : 사용자 요청 정보를 Request body(Payload) 로 전달
            - PUT        :
            - PATCH      : 
            - DELETE     : 
    -->
    <div class="wrapp container">

        <form action="/test.jsp" method="get">
            <div class="row m-2">
                <label class="col-4">아이디</label>
                <input name="userid" type="text" class="col form-control"/>
                <a href="javascript:void(0)" class="col-2 btn btn-success"">중복확인</a>
            </div>
            <div class="row m-2">
                <label class="col-4">비밀번호</label>
                <input name="password" type="password" class="col form-control"/>
            </div>
            <div class="row m-2">
                <label class="col-4">비밀번호 확인</label>
                <input name="re-password" type="password" class="col form-control" />
            </div>
            <div class="row m-2">
                <label class="col-4">이름</label>
                <input name="username" type="text" class="col form-control"/>
            </div>
            <div class="row m-2">
                <label class="col-4">우편번호</label>
                <input name="zipcode" type="text" class="col form-control" />
                <a href="javascript:void(0)" class="col-1 btn btn-success">검색</a>
            </div>
            <div class="row m-2">
                <label class="col-4">기본주소</label>
                <input name="addr1" type="text" class="col form-control"/>
            </div>
            <div class="row m-2">
                <label class="col-4">상세주소</label>
                <input name="addr2" type="text" class="col form-control"/>
            </div>
            <div class="row m-2">
                <label class="col-4">휴대전화</label>
                <select class="col form-select me-1">
                    <option value="" selected>010</option>
                    <option value="">011</option>
                </select>
                <input type="text" class="col form-control"/>
                <input type="text" class="col form-control"/>
            </div>
            <div class="row m-2">
                <label class="col-4">연락처</label>
                <select class="col form-select me-1">
                    <option value="" selected>053</option>
                    <option value="">055</option>
                    <option value="">02</option>
                </select>
                <input type="text" class="col form-control"/>
                <input type="text" class="col form-control"/>
            </div>
            <div class="row m-2">
                <label class="col-4">이메일</label>
                <input type="text" class="col form-control"/>
                <select class="col form-select me-1">
                    <option value="" selected>@naver.com</option>
                    <option value="">@outlook.co.kr</option>
                    <option value="">@google.com</option>
                </select>
            </div>
            <div class="row m-2">
                <label class="col-4">생년월일</label>
                <input name="birth" value="a" type="radio" class="col -auto"/> <span class="col-1">양</span>
                <input name="birth" value="b" type="radio" class="col -auto"/> <span class="col-1">음</span>
            </div>

            <div class="row m-2">
                <select class="col form-select me-1">
                    <option value="" selected>2025</option>
                    <option value="">2024</option>
                    <option value="">2023</option>
                </select>
                <select class="col form-select me-1">
                    <option value="" selected>12</option>
                    <option value="">11</option>
                    <option value="">10</option>
                </select>
                <select class="col form-select me-1">
                    <option value="" selected>01</option>
                    <option value="">02</option>
                    <option value="">03</option>
                </select>
            </div>
            <hr />
            <div class="row m-2">
                <input id="email-recv" name="email-recv" type="checkbox" class="col-1 form-check"/>
                <label for="email-recv" class="col">이메일 수신에 동의합니다.</label>
            </div>
            <div class="row m-2">
                <input id="sms-recv" name="sms-recv" type="checkbox" class="col-1 form-check"/>
                <label for="sms-recv" class="col">문자메시지 수신에 동의합니다.</label>
            </div>
            <div class="row m-2">
                <input class="btn btn-primary" type="submit" value="회원가입"/>
            </div>

        </form>
    </div>

</body>

</html>
