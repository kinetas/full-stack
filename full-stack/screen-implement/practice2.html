<!DOCTYPE html>
<html lang="en"> <!-- HTML 문서의 시작, lang 속성은 문서의 기본 언어를 영어로 설정 -->
<head>
    <meta charset="UTF-8"> <!-- 문서의 문자 인코딩을 UTF-8로 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 반응형 웹 디자인을 위한 뷰포트 설정(모바일이나 데스크탑 등 
    장치에 맞는 설정)-->
    <title>Document</title> <!-- 웹 페이지의 제목을 설정, 브라우저 탭에 표시됨 -->
</head>
<body>
hello world!!
</body>
</html>
