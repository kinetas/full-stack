<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td,
        th {
            text-align: center;
            width: 55px;
            height: 55px;
            border: 1px solid;
        }

        thead {
            background-color: black;
            color: white;
        }

        tbody {
            background-color: orange;
            color: white;
        }

        tfoot {
            background-color: green;
            color: white;
        }
    </style>
</head>

<body>
    <table>
        <caption>SEMENTIC</caption>

        <tbody>
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
            </tr>
        </tbody>

        <thead>
            <tr>
                <td>1열</td>
                <td>2열</td>
                <td>3열</td>
            </tr>
        </thead>
        <tfoot>
            <tr>
                <td>7</td>
                <td>8</td>
                <td>9</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
