<!DOCTYPE html>
<html lang="en"> <!-- HTML 문서의 시작, lang 속성은 문서의 기본 언어를 영어로 설정 -->
<head>
    <meta charset="UTF-8"> <!-- 문서의 문자 인코딩을 UTF-8로 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 반응형 웹 디자인을 위한 뷰포트 설정(모바일이나 데스크탑 등 
    장치에 맞는 설정)-->
    <title>Document</title> <!-- 웹 페이지의 제목을 설정, 브라우저 탭에 표시됨 -->
</head>
<body>
    <!--  
        <!DOCTYPE html>     :   이 문서가 HTML5 문서임을 선언    
        <html lang="ko">    :   HTML문서의 시작을 나타내며  lang 속성을 이용하여 문서의 기본언어가 한국어임을 명시
        <head>              :   문서의 메타데이터와 제목등을 포함하는 머리말
        <meta charset="UTF-8"> : 문서의 문자 인코딩을 UTF-8 으로 설정
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        : 반응형 웹 디자인을 위한 뷰포트 설정
        : width=device-width : 뷰포트의 너비를 디바이스의 너비만큼 설정   
        : initial-scale=1.0 : 페이지가 처음 로드될때 기본 확대/축소 수준을 지정 
        <title>Document</title>                    
        <body>              :   문서의 본문, 브라우저에 ViewPort(웹페이지를 사용자가 보는영역)에 표시되는 내용 
    -->
    <!-- 
        Ctrl + + : 확대
        Ctrl + - : 축소
        Ctrl + / : 주석, 해제
        Ctrl + shift + p : 설정 환경 진입

        alt + shift + '↓' : 한줄 복사
        alt + shift + f : 코드정리

    -->
    <!-- 확장 플러그인 정리 -->
     <!-- 
            korean
            live server
            Auto Rename Tag
     -->
</body>
</html>
