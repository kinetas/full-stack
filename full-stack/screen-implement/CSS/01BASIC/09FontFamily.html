<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <style>
        /* google font css */
        .orbitron-pixel{
            font-family: "Orbitron", sans-serif;
            font-optical-sizing: auto;
            font-weight: bold;
            font-style: normal;
        }
        /* font 등록 */
        @font-face {
            font-family: "custom-01";
            src: url(./fonts/MaruBuri-Bold.ttf);
            font-style: normal;
        }
        @import url('https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css');
    </style>

</head>

<body>
    <div style="font-family: 'Times New Roman', Times, serif;">HELLO WORLD</div>
    <div>HELLO WORLD</div>
    <div class="orbitron-pixel">HELLO WORLD</div>
    <div style="font-family: custom-01;">HELLO WORLD</div>
    <div style="font-family: galmuri;">HELLO WORLD</div>
</body>

</html>
