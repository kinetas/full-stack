<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            font-size: 16px;
        }
    </style>
</head>

<body>
    <!-- px : 고정크기 기본값 -->
    <div style="font-size: 48px;">
        <div style="font-size: 32px;">HELLO WORLD</div>
        <div style="">HELLO WORLD</div>
        <div style="font-size: 8px;">HELLO WORLD</div>
        <div style="font-size: 36px;">HELLO WORLD</div>
    </div>
    <hr>

    <!-- em : 상태크기(부모태그의 font-size를 기준으로 한 배수) -->
    <div style="font-size: 24px;">
        <div style="font-size: 1em;">HELLO WORLD</div>
        <div style="font-size: 2em;">HELLO WORLD</div>
        <div style="font-size: 3em;">HELLO WORLD</div>
        <div style="font-size: 0.5em;">HELLO WORLD</div>
    </div>
    <hr>
    
    <!-- rem : 상태크기(기본글자크기 : root) -->
    <div style="font-size: 24px;">
        <div style="font-size: 1rem;">HELLO WORLD</div>
        <div style="font-size: 2rem;">HELLO WORLD</div>
        <div style="font-size: 3rem;">HELLO WORLD</div>
        <div style="font-size: 0.5rem;">HELLO WORLD</div>
    </div>
    <hr>
    
    <!-- % : 상태크기(상위태그 기준) -->
    <div style="font-size: 24px;">
        <div style="font-size: 100%;">HELLO WORLD</div>
        <div style="font-size: 50%;">HELLO WORLD</div>
        <div style="font-size: 200%;">HELLO WORLD</div>
        <div style="font-size: 75%;">HELLO WORLD</div>
    </div>
    <hr>

    <!-- vw : 상태크기(뷰포트 기준) -->
    <div style="font-size: 24px;">
        <div style="font-size: 1vw;">HELLO WORLD</div>
        <div style="font-size: 1.5vw;">HELLO WORLD</div>
        <div style="font-size: 2vw;">HELLO WORLD</div>
        <div style="font-size: clamp(16px,3vw,80px);">HELLO WORLD</div>
    </div>
    <hr>

    <div style="width: calmp(200px,50vw1280px); height: 200px;border: 1px solid;margin: 0 auto;">
        <div style= " font-size: clamp(.8rem,5vw,4rem); text-align: center; line-height: 200px;">
            HELLOWORLD
        </div>
    </div>
</body>

</html>
