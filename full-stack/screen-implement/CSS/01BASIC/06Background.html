<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        body{
            margin: 0;
            padding: 0;
        }
        .wrapper{
            height: 3000px;
        }
        .bg{
            position: absolute;
            /* top: 800px; */
            width: 100%;
            height: 100%;
            /* background-color: orange; */
            background-image: url(./Images/2026_spring1_ph1_pick_bg_mo_260220.jpg);
            background-repeat: no-repeat;
            /* cover : 전체 채우기, contain : 이미지 비율에 맞게 표시 */
            background-size: contain;
            background-attachment: fixed;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="bg"></div>
    </div>
</body>

</html>
