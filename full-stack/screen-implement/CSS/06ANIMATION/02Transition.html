<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        div{
            width: 100px;
            height: 500px;
            border: 1px solid;
            margin: 10px 30px;
            display: inline-block;
        }
        img{
            width: 100%;height: 100px;
            border: 1px solid gray;
            position: relative;
            left: 0;
            top: 0;
            transition: 3s;
        }
        img:hover{
            top: 400px;;
            transition: .5s;
        }
    </style>
</head>

<body>
    <div><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s" alt=""></div>
    <div><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGa70BgePn1Rsf41oiG6ac0_TAzpKXj4d9qg&s" alt=""></div>
    <div><img src="https://cdn.pixabay.com/photo/2016/11/21/06/53/beautiful-natural-image-1844362_1280.jpg" alt=""></div>
</body>

</html>
