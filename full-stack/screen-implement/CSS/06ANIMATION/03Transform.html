<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        .parent{
            width: 1000px;
            height: 1000px;
            border: 1px solid;
            
        }
        .son{
            width: 250px;
            height: 250px;
            background-color: orange;
            transition: .7s;
        }
        .parent:hover>.son{
            /* 위치이동 */
            /* transform: translate(700px,700px); */
            /* transform: translateX(850px); */
            /* transform: translateY(850px); */
            
            /* 크기조정 */
            /* transform: scale(4,4); */
            
            /* 회전 */
            /* transform: rotate(90deg); */
            
            /* 기울이기 */
            /* transform: skew(30deg); */
            
            /* 동시적용 */
            transform: translate(400px,400px) scale(2,2) skew(45deg) rotate(360deg);
            
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="son"></div>
    </div>
</body>

</html>
