<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        .chk-block{
            display: flex;
            align-items: center;
            gap: 5px;
        }
        input[type="checkbox"]{
            /* border: 5px solid;
            width: 150px;
            height: 150px; */
            display: none;
        }
        input[type="checkbox"]+label{
            display: inline-block;
            width: 50vw;
            height: 50vw;
            /* border: 1px solid violet; */
            cursor: pointer;
            margin: 50% auto;
            
        }
        input[type="checkbox"]:checked+label{
            background-image: url(../../HTML/Images/thumb_d_2F583E5543F7E19139C6FCFFBF9607A6.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        
    </style>

</head>
<body>
    <div class="chk-block">
        <input type="checkbox"id="chk">
        <label for="chk"></label>

    </div>
</body>
</html>
