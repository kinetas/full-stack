<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* common */
        * {
            box-sizing: border-box;
        }

        ul {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        a {
            text-decoration: none;
            /* color: black; */
        }

        body {
            margin: 0;
            padding: 0;
        }

        /* main page */

        /* header */
        .wrapper {}

        .wrapper>header {}

        .wrapper>header>.top-header {}

        .wrapper>header>.top-header>.head-menu {
            height: 104px;
            background-color: rgb(23, 26, 33);
            margin: 0;
            padding: 0;
            display: flex;
            /* justify-content: space-between; */

        }

        .wrapper>header>.top-header>.head-menu>.logo {
            margin: 0 20px;
            color: white;
            line-height: 80px;
        }

        .wrapper>header>.top-header>.head-menu>.head-menu-bar>li {
            /* border:1px solid; */
            
            height: 50px;
            padding: 0 20px;
            /* gap: 35px; */
            margin: 10px 0;

            width: clamp(150px, 15vw, 250px);
            display: inline-block;
        }
        
        .wrapper>header>.top-header>.head-menu>.head-menu-bar>li>a {
            display: block;
            height: 100%;
            line-height: 50px;
            text-align: center;
            color: white;
            line-height: 104px;
            position: relative;
        }

        .wrapper>header>.top-header>.head-menu>.head-menu-bar>li>ul.head-sub-menu {
            width: 100%;
            height: 100%;

            display: none;
        }

        .wrapper>header>.top-header>.head-menu>.head-menu-bar>li>ul.head-sub-menu>li {
            height: 50px;
            line-height: 50px;
            padding: 0 20px;
            background-color: grey;
            position: absolute;
            top: 100px;
        }
        .wrapper>header>.top-header>.head-menu>.head-menu-bar>li>ul.head-sub-menu>li>a {
            
        }
        .wrapper>header>.top-header>.head-menu>.head-menu-bar>li:hover>ul.head-sub-menu {
            display: block;
        }

        .wrapper>header>nav {}

        /* nav's menu */
        .wrapper>header>nav>ul.main-menu {
            display: flex;
            justify-content: space-between;
            height: 100%;
            background-color: orange;
            padding: 20px 0;

        }

        .wrapper>header>nav>ul.main-menu>li {
            /* border:1px solid; */
            display: flex;
            height: 50px;
            padding: 0 20px;
            background-color: royalblue;
            gap: 35px;
            margin: 10px 0;

            width: clamp(150px, 15vw, 250px);
        }

        .wrapper>header>nav>ul.main-menu>li>a {
            display: block;
            height: 100%;
            line-height: 50px;
            text-align: center;
            color: white;


        }

        .wrapper>header>nav>ul.main-menu>li>ul.sub-menu {
            /* border:1px solid; */
            width: 100%;
            height: 100%;

            display: none;
            position: relative;



        }

        .wrapper>header>nav>ul.main-menu>li>ul.sub-menu>li {
            background-color: green;
            height: 50px;
            line-height: 50px;
            padding: 0 20px;

        }

        .wrapper>header>nav>ul.main-menu>li:hover .sub-menu {
            display: flex;
        }


        /* main */
        .wrapper>main {}

        .wrapper>main>section {}

        /* footer */
        .wrapper>footer {}


        /* fixed items */
        .fixed-menu {
            position: fixed;
            right: 0;
            top: 60%;
            min-width: 400px;
            height: 300px;
            border: 1px solid;
            margin: 20px;
            display: flex;
            justify-content: left;
            align-items: center;
            flex-direction: column;
        }

        .fixed-menu li {
            min-height: 50px;
            border: 1px solid;
            margin: 10px;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;

        }
    </style>
</head>

<body>

    <div class="wrapper">
        <header>
            <div class="top-header">
                <ul class="head-menu">
                    <div class="logo">
                        <h2>Steam</h2>
                    </div>
                    <div class="head-menu-bar">
                        <li>

                            </ul>
                        </li>
                        <li>
                            <a href="javascript:void(0)">Community</a>
                            <ul class="head-sub-menu">
                                <li><a href="javascript:void(0)">Home</a></li>
                                <li><a href="javascript:void(0)">Discussion</a></li>
                                <li><a href="javascript:void(0)">Workshop</a></li>
                                <li><a href="javascript:void(0)">Market</a></li>
                                <li><a href="javascript:void(0)">Broadcasts</a></li>
                            </ul>
                        </li>
                        <li>
                            <a href="javascript:void(0)">About</a>
                        </li>
                        <li>
                            <a href="javascript:void(0)">Support</a>
                        </li>
                    </div>
                </ul>
            </div>
            <nav>


            </nav>
        </header>

        <main>
            <section></section>
        </main>

        <footer></footer>
    </div>

</body>

</html>
