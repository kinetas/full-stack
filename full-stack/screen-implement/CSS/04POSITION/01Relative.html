<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;}
        body{margin: 0; padding: 0;}
        div{
            width: 50px;
            height: 50px;
            border: 1px solid;
            background-color: orange;
        }
        div:nth-child(1){
            position: relative;
            left: 20px;
            top: -10px;
        }
        div:nth-child(2){
            position: relative;
            top: 10px;
            left: 10px;
        }
        div:nth-child(3){
            position: relative;
            /* top: calc(50vh - 100px);
            left: 50vw; */
        }
        div:nth-child(4){
            position: absolute;
            top: 50vh;
            left: 50vw;
        }
    </style>
</head>

<body>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
</body>

</html>
