<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height : 3000px;
        }
        .parent{
            width: 500px;
            height: 500px;
            border: 1px solid;
            margin-top: 250px;
            background-color: orange;
        }
        .parent>.son{
            width: 100px;
            height: 100px;
            font-size: .8rem;
            background-color: royalblue;
            border: 1px solid;
            color: white;
        }
        .parent>.son:nth-child(1){
            position: relative;
            left: 0;
            top: 0;
        }
        .parent>.son:nth-child(2){
            position: absolute;
            left: 110px;
            top: 250px;
        }
        .parent>.son:nth-child(3){
            position: fixed;
            left: 211px;
            top: 251px;
        }
        .parent>.son:nth-child(4){
            position: sticky;
            /* 가로스크롤이 있을 때 적용 */
            left: 0;
            /* 세로스크롤이 있을 때 적용 */
            /* 스크롤이 있을 때 top만큼 띄운 채 이동 */
            top: 0;
            margin-left: 400px;
            margin-top:-102px;
        }
    </style>
</head>
<body>
    
    <div class="wrapper">
        <header></header>
        <main>
            <section>
                <div class="parent">
                    <div class="son">relative</div>
                    <div class="son">absolute</div>
                    <div class="son">fixed</div>
                    <div class="son">sticky</div>
                </div>
            </section>
        </main>
        <footer></footer>
    </div>

</body>
</html>
